<html>
	<!--- Enjoy! --->
<head>
<meta http-equiv="Content-type" content="text/html;charset=UTF-8" />
	<title>Pool Parameters</title>
	<style>
		table, th, td{
			border: 1px solid #1b4170;
		}
		select,textarea,button {
			border:none;
			border-radius:5px;
			padding: 2px;
		}
		input:focus,select:focus,textarea:focus,button:focus {
			outline:none;
		}
		.firstkey{
			float:left;
			border-top: 1px solid #1b4170;
			border-left: 1px solid #1b4170;
			border-bottom: 1px solid #1b4170;
			padding:4px;
			border-top-left-radius:13px;
			background-color:#fefcff;
		}
		.firstvalue{
			float:left;
			border: 1px solid #1b4170;
			padding:4px;
			border-top-right-radius:13px;
			background-color:#fefcff;
		}
		.key{
			float:left;
			border-left: 1px solid #1b4170;
			border-right: 1px solid #1b4170;
			border-bottom: 1px solid #1b4170;
			padding:4px;
			background-color:#fefcff;
		}
		.value{
			float:left;
			border-right: 1px solid #1b4170;
			border-bottom: 1px solid #1b4170;
			padding:4px;
			background-color:#fefcff;
		}
		.lastkey{
			float:left;
			border-left: 1px solid #1b4170;
			border-right: 1px solid #1b4170;
			border-bottom: 1px solid #1b4170;
			padding:4px;
			border-bottom-left-radius:13px;
			background-color:#fefcff;
		}
		.lastvalue{
			float:left;
			border-right: 1px solid #1b4170;
			border-bottom: 1px solid #1b4170;
			padding:4px;
			border-bottom-right-radius:13px;
			background-color:#fefcff;
		}
		#jsmodule{
			float:left;
			background-color:#ffffff;
			padding:5px;
		}
	</style>
</head>
	<body>
		<div id="jsmodule">
			<div id="slselect">
				<input type="radio" id="radiopp" onclick="writeSelector('pp');" />P&P <input type="radio" id="radioreo" onclick="writeSelector('reo');" />REO
			</div>
			<div id="selector">&nbsp;
			</div>
			<div id="infoDiv">&nbsp;
			</div>
		</div>
		<script type="text/javascript" src="./ajaxFunctions.js"></script>
		<script type="text/javascript" src="./poolParameters.js"></script>
	</body>
</html>
